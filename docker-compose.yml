services:
  backend:
    image: it-ticketing-backend:latest
    container_name: it-ticketing-backend
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - it-ticketing-data:/app/data
      # Separat volym för backuper — OBS: skapa volymen manuellt i Portainer GUI
      # innan deploy (Volumes → Add volume → it-ticketing-backups, driver: local).
      - it-ticketing-backups:/app/data/backups
    environment:
      - NODE_ENV=production
      # Frontend serveras över HTTP på LAN (8082:80). Webbläsare lagrar INTE
      # Secure-cookies på icke-HTTPS-origins → CSRF-/refresh-cookies tappas och
      # ärenden går inte att spara (särskilt i installerad PWA på telefon).
      # Sätt COOKIE_SECURE=true om du terminerar TLS framför appen.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - JWT_SECRET=${JWT_SECRET}
      - CSRF_SECRET=${CSRF_SECRET}
      - DB_PATH=/app/data/database.sqlite
      - UPLOAD_DIR=/app/data/uploads
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_NAME=${ADMIN_NAME:-}
      - BRAND_NAME=${BRAND_NAME:-IT-Support}
      - AUTO_CLOSE_DAYS=${AUTO_CLOSE_DAYS:-30}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - APP_BASE_URL=${APP_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_MODEL_SMART=${AI_MODEL_SMART:-}
      - AI_MAX_SUMMARY_COMMENTS=${AI_MAX_SUMMARY_COMMENTS:-}
      - AI_MONTHLY_TOKEN_LIMIT=${AI_MONTHLY_TOKEN_LIMIT:-}
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASS=${IMAP_PASS:-}
      - IMAP_SECURE=${IMAP_SECURE:-true}
      - IMAP_POLL_INTERVAL=${IMAP_POLL_INTERVAL:-60}
      - IMAP_AUTO_CREATE_CONTACT=${IMAP_AUTO_CREATE_CONTACT:-true}
      - IMAP_TENANT_ID=${IMAP_TENANT_ID:-}
      - IMAP_CLIENT_ID=${IMAP_CLIENT_ID:-}
      - IMAP_CLIENT_SECRET=${IMAP_CLIENT_SECRET:-}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - OFFSITE_BACKUP_CMD=${OFFSITE_BACKUP_CMD:-}
      - PUSH_AGING_DAYS=${PUSH_AGING_DAYS:-7}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ticketing

  frontend:
    image: it-ticketing-frontend:latest
    container_name: it-ticketing-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ticketing

networks:
  ticketing:
    driver: bridge

volumes:
  it-ticketing-data:
    external: true
  # Dedikerad volym för backuper — separerad från live-DB:n.
  # Skapa manuellt i Portainer GUI innan deploy: Volumes → Add volume → it-ticketing-backups.
  it-ticketing-backups:
    external: true
