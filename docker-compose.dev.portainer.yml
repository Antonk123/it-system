# ─────────────────────────────────────────────────────────────────────────────
# DEV-stacken — Portainer-stack "it-system-dev" (id 40) på 10.38.195.180.
#
# Detta är den VERSIONSSPÅRADE KÄLLAN. Portainer redigeras manuellt i GUI:t och
# MÅSTE spegla denna fil (samma drift-regel som prod-stacken, se lessons.md /
# docs/dev-db-isolation-runbook.md). Driv aldrig isär dem.
#
# Skillnad mot prod (docker-compose.yml):
#   • EGEN DB-volym  (it-ticketing-dev-data)        → delar INTE prod-DB:n. Detta är
#     den enda isolering som behövs — dev får ALDRIG skriva i prod-DB:n.
#   • DELAR checkout med prod-bygget (/opt/it-system/itticket-main, på main).
#     `git pull` där tar in ändringar till BÅDE dev och prod-build-källan, men PROD
#     ser inget förrän du bygger ny image + deployar. Så main kan testas i lugn och
#     ro på dev innan prod-deploy. (Det gamla worktreet itticket-dev är borttaget —
#     det behövdes bara när dev körde en egen feature-gren; vi mergar nu rakt till main.)
#   • Hot-reload: backend tsx watch (3003), frontend Vite (5174). Bara `git pull`
#     i itticket-main behövs — ingen image-rebuild för dev.
#
# Env-variabler (${JWT_SECRET} m.fl.) sätts i Portainer-stackens "Environment
# variables", inte här. Inga hemligheter får checkas in i denna fil.
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    image: node:22-alpine   # matchar prod (Dockerfile.server) → prebyggd better-sqlite3 på musl, ingen kompilering
    container_name: it-ticketing-backend-dev
    working_dir: /app/server
    # npm ci (INTE install): rör ALDRIG package-lock.json → ingen lockfile-write-back i
    # den delade checkouten (itticket-main), så `git pull --ff-only` slutar blockeras.
    # Kräver att lockfilen är i synk med package.json (den är det) — annars failar boot
    # med flit, vilket är önskat. Gäller även frontend nedan.
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3003:3001"
    volumes:
      - /opt/it-system/itticket-main:/app         # DELAD med prod-bygget (main). DB-isoleras via dev-volymen nedan.
      - it-ticketing-dev-data:/app/data           # egen DB-volym, INTE prod
      - /app/node_modules                         # anon-volym: skydda host-checkouten från npm install
      - /app/server/node_modules
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET}
      # CSRF_SECRET KRÄVS — backend gör process.exit(1) utan den (server/src/index.ts,
      # ovillkorligt, ingen dev-fallback). Måste finnas i Portainer-stackens env.
      - CSRF_SECRET=${CSRF_SECRET}
      - DB_PATH=/app/data/database.sqlite
      - UPLOAD_DIR=/app/data/uploads
      - CORS_ORIGIN=${CORS_ORIGIN}
      # OBS: dev kör mot en KOPIA av riktig prod-data och billar riktig Anthropic-API.
      # Sätt AI_MONTHLY_TOKEN_LIMIT (eller lämna ANTHROPIC_API_KEY tom för att stänga av AI i dev).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_MONTHLY_TOKEN_LIMIT=${AI_MONTHLY_TOKEN_LIMIT:-}
    networks:
      - ticketing
    restart: unless-stopped

  frontend:
    image: node:22-alpine   # matchar prod (Dockerfile.server) → prebyggd better-sqlite3 på musl, ingen kompilering
    container_name: it-ticketing-frontend-dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5174"   # npm ci: se backend-kommentaren
    ports:
      - "5174:5174"
    volumes:
      - /opt/it-system/itticket-main:/app
      - /app/node_modules
    environment:
      # OBS: IP-adressen nedan är ett fallback — i Portainer sätts VITE_API_URL som
      # en Portainer-hanterad env-variabel (Environment variables i stack-GUI:t) och
      # skriver över detta default. Ändra aldrig IP:n här utan i Portainer-stacken.
      - VITE_API_URL=${VITE_API_URL:-http://10.38.195.180:3003/api}
    depends_on:
      - backend
    networks:
      - ticketing
    restart: unless-stopped

networks:
  ticketing:
    driver: bridge

volumes:
  it-ticketing-dev-data:
    external: true
    name: it-ticketing-dev-data
