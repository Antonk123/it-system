<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png?v=pfm-1" type="image/png" />
    <link rel="shortcut icon" href="/favicon.png?v=pfm-1" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png?v=pfm-1" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff9e4d" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IT-Ticket" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <title>IT-Ticket</title>
    <meta name="description" content="IT ärendehantering & asset management" />

    <meta property="og:title" content="IT-Ticket System" />
    <meta property="og:description" content="IT ärendehantering & asset management" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="" />

    <!-- FOUC prevention: apply mode and font classes before React hydrates (D-08) -->
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('app-mode-theme');
          document.documentElement.classList.add(
            (mode === 'light' || mode === 'dark') ? mode : 'dark'
          );
          var font = localStorage.getItem('app-font-theme');
          if (font && ['font-jakarta','font-crimson','font-libre','font-jetbrains'].indexOf(font) !== -1) {
            document.documentElement.classList.add(font);
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
