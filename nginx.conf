events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Backup restore endpoint — needs higher upload limit (full DB + uploads ZIP).
        # ^~ ensures this prefix match wins over the broader /api/ block below.
        location ^~ /api/backup/restore {
            resolver 127.0.0.11 valid=30s;
            set $backend http://it-ticketing-backend:3001;
            client_max_body_size 500m;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Proxy API requests to backend
        # ^~ ensures this prefix match takes priority over regex location blocks below,
        # preventing e.g. /api/kb/images/photo.jpg from being caught by the static-files
        # regex and served (incorrectly) as a frontend asset.
        location ^~ /api/ {
            resolver 127.0.0.11 valid=30s;
            set $backend http://it-ticketing-backend:3001;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            # Fynd 7: Höj timeouts för GET /api/backup (live-ZIP-streaming kan ta >60s default).
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Service worker must never be cached - browser checks for SW updates via HTTP cache
        location = /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
            try_files $uri =404;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
