version: 2
updates:
  # Frontend (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"
    # Bundla minor/patch till EN PR per vecka för att minska brus. Major-bumpar
    # kommer som egna PR:er (triggerbaserat per projektets policy, inte rutin).
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # Backend (server/package.json)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # GitHub Actions i workflowsen (pinnade actions hålls aktuella)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
