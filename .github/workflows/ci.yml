name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd server && npm ci
      - run: npx eslint . --max-warnings 5
      # Root-tsconfig har files:[]+references → 'tsc --noEmit' typecheckar INGET. Kör projekten explicit.
      - run: npx tsc --noEmit -p tsconfig.app.json
      - run: npx tsc --noEmit -p tsconfig.node.json
      - run: npm test

  lint-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && npx tsc --noEmit
      # --coverage verkställer ratchet-trösklarna i vitest.config.ts (fäller
      # bygget om täckningen tappar under dem).
      - run: cd server && npm test -- --coverage

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.server -t test-backend .
      - run: docker build -f Dockerfile.client -t test-frontend .

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd server && npm ci
      # Fäll bygget på en känd HIGH/CRITICAL-advisory i något av träden. Båda är
      # rena idag (0 vulns) → detta är en framåtblickande spärr, inte en gate som
      # fäller nuvarande kod. Flykt om en OFIXBAR transitiv high dyker upp: sänk
      # till '--audit-level=critical' tillfälligt eller lägg en `npm audit`-override.
      - run: npm audit --audit-level=high
      - run: cd server && npm audit --audit-level=high
